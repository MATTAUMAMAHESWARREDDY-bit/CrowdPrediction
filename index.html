<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crowd Prediction System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}

body{
    background: linear-gradient(120deg, #eef2ff, #ecfeff);
    min-height:100vh;
}

/* HEADER */
header{
    background:#1e293b;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header span{
    font-size:20px;
    font-weight:600;
}

.header-btn{
    background:#38bdf8;
    border:none;
    padding:8px 18px;
    border-radius:20px;
    cursor:pointer;
    font-size:14px;
}

.header-btn:hover{
    background:#0ea5e9;
    color:white;
}

.logout-btn{
    background:#ef4444;
    color:white;
}

/* MAIN */
.container{
    display:flex;
    justify-content:center;
    gap:30px;
    padding:40px;
    flex-wrap:wrap;
}

/* CARD */
.card{
    background:white;
    width:420px;
    padding:25px;
    border-radius:16px;
    box-shadow:0 12px 30px rgba(0,0,0,0.1);
}

.card h2{
    text-align:center;
    margin-bottom:20px;
    color:#1e293b;
}

label{
    display:block;
    margin:10px 0 5px;
    font-weight:500;
}

select, input, textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    margin-bottom:12px;
}

textarea{
    resize:none;
    height:80px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    display:none;
}

th, td{
    padding:10px;
    text-align:center;
    border:1px solid #e2e8f0;
}

th{
    background:#1e293b;
    color:white;
}

.heavy{ background:#fee2e2; color:#b91c1c; font-weight:600; }
.medium{ background:#fef9c3; color:#92400e; font-weight:600; }

/* COMMENTS */
.comment{
    background:#f8fafc;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}

.comment small{
    color:gray;
}

/* ADMIN */
.admin-section{
    display:none;
}

.button-group{
    display:flex;
    gap:15px;
    margin-bottom:15px;
}

.button-group button{
    background:#38bdf8;
    color:#0f172a;
}

.section{
    display:none;
}

/* LOGIN MODAL */
#loginBox{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

#loginBox .login-card{
    background:white;
    padding:30px;
    border-radius:15px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

footer{
    text-align:center;
    padding:15px;
    color:#475569;
}
</style>
</head>

<body>

<header>
    <span>🛕 Crowd Prediction System</span>
    <button id="headerBtn" class="header-btn" onclick="openLogin()">Admin Login</button>
</header>

<!-- LOGIN POPUP -->
<div id="loginBox">
    <div class="login-card">
        <h2 style="text-align:center;margin-bottom:20px;">Admin Login</h2>
        <input id="username" type="text" placeholder="Admin ID">
        <input id="password" type="password" placeholder="Password">
        <button onclick="checkLogin()">Login</button>
    </div>
</div>

<!-- USER PAGE -->
<div id="userPage" class="container">

    <div class="card">
        <h2>Check Crowd Status</h2>

        <label>Temple</label>
        <select>
            <option>Select Temple</option>
            <option>Tirupati</option>
            <option>Sabarimala</option>
        </select>

        <label>Festival</label>
        <select>
            <option>Select Festival</option>
            <option>Sivaratri</option>
        </select>

        <button onclick="showTable()">Check Crowd</button>

        <table id="crowdTable">
            <tr>
                <th>Time</th>
                <th>Crowd</th>
            </tr>
            <tr>
                <td>Morning</td>
                <td class="medium">Medium</td>
            </tr>
            <tr>
                <td>Afternoon</td>
                <td class="medium">Medium</td>
            </tr>
            <tr>
                <td>Evening</td>
                <td class="heavy">High</td>
            </tr>
        </table>
    </div>

    <div class="card">
        <h2>User Comments</h2>
        <input type="email" placeholder="Email">
        <textarea placeholder="Write comment..."></textarea>
        <button>Post Comment</button>

        <div class="comment">
            <strong>user@gmail.com</strong>
            <p>Evening is very crowded.</p>
            <small>12 Feb 2026</small>
        </div>
    </div>

</div>

<!-- ADMIN PAGE -->
<div id="adminPage" class="container admin-section">

    <div class="card">
        <h2>Admin Panel</h2>

        <div class="button-group">
            <button onclick="showFestival()">Add Festival</button>
            <button onclick="showData()">Add Data</button>
        </div>

        <div id="festivalSection" class="section">
            <label>Temple</label>
            <select>
                <option>Tirupati</option>
                <option>Sabarimala</option>
            </select>

            <label>Festival Name</label>
            <input type="text">

            <button>Add Festival</button>
        </div>

        <div id="dataSection" class="section">
            <label>Festival</label>
            <select>
                <option>Sivaratri</option>
            </select>

            <label>Upload Dataset</label>
            <input type="file">

            <label>High Crowd Limit</label>
            <input type="number">

            <label>Medium Crowd Limit</label>
            <input type="number">

            <button>Save Data</button>
        </div>
    </div>

</div>

<footer>
    © 2026 Crowd Prediction System
</footer>

<script>
function showTable(){
    document.getElementById("crowdTable").style.display="table";
}

function openLogin(){
    document.getElementById("loginBox").style.display="flex";
}

function checkLogin(){
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(u === "mahi" && p === "mahi4248"){
        document.getElementById("loginBox").style.display="none";
        login();
    }else{
        alert("Invalid Admin ID or Password");
    }
}

function login(){
    document.getElementById("userPage").style.display="none";
    document.getElementById("adminPage").style.display="flex";
    let btn = document.getElementById("headerBtn");
    btn.innerText="Logout";
    btn.classList.add("logout-btn");
    btn.onclick=logout;
}

function logout(){
    document.getElementById("adminPage").style.display="none";
    document.getElementById("userPage").style.display="flex";
    let btn = document.getElementById("headerBtn");
    btn.innerText="Admin Login";
    btn.classList.remove("logout-btn");
    btn.onclick=openLogin;
}

function showFestival(){
    festivalSection.style.display="block";
    dataSection.style.display="none";
}

function showData(){
    dataSection.style.display="block";
    festivalSection.style.display="none";
}
</script>

</body>
</html>
